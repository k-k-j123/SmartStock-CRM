services:
  mongodb:
    image: mongo:latest
    container_name: smartstock-db
    ports:
      - "27017:27017"
    command: ["--bind_ip_all"]
    volumes:
      - mongo-data:/data/db

  java-backend:
    build: .
    container_name: smartstock-java
    ports:
      - "8080:8080"
    depends_on:
      - mongodb

  ai-service:
    build: ./ai-service
    container_name: smartstock-ai
    ports:
      - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongodb:27017
    depends_on:
      - mongodb

volumes:
  mongo-data: